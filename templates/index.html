<!DOCTYPE html>
<html>
<head>
    <title>Insurance Cost Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h2>Insurance Cost Prediction</h2>

<form action="/predict" method="post">

Age:
<input type="number" name="age" required><br><br>

Sex:
<select name="sex">
<option value="0">Female</option>
<option value="1">Male</option>
</select><br><br>

BMI:
<input type="number" step="0.1" name="bmi" required><br><br>

Children:
<input type="number" name="children"><br><br>

Smoker:
<select name="smoker">
<option value="0">No</option>
<option value="1">Yes</option>
</select><br><br>

Region:
<select name="region">
<option value="northeast">Northeast</option>
<option value="northwest">Northwest</option>
<option value="southeast">Southeast</option>
<option value="southwest">Southwest</option>
</select>
<br><br>

<input type="submit" value="Predict Insurance Cost">

</form>

<h3>{{ prediction_text }}</h3>

</body>
</html>
